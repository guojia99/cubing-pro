global:
  baseHost: "http://127.0.0.1"
  #  baseHost: https://cubing.pro
  debug: true
  xStaticPath: "/x-static" # 后端资源文件
  xFilePath: "/x-file" # 其他资源文件
  db:
    driver: "sqlite"
    dsn: "./cubingPro.db"
  #    driver: "mysql" # 数据库类型
  #    dsn: "root:cube123456@tcp(127.0.0.1:3306)/cubing_pro?charset=utf8&parseTime=True&loc=Local"
  scramble:
    endpoint: "http://127.0.0.1:20009" # 打乱服务器
  emailConfig:
    smtpHost: "smtp.qq.com"
    smtpPort: 587
    from: "xxx@qq.com"
    fromName: cubingPro
    password: ""
  wca_db:
    syncUrl: 'https://www.worldcubeassociation.org/export/results/WCA_export.tsv'
    syncTime: 1 # 小时
  # WCA OAuth2 登录配置
  wcaAuth2:
    appId: ""        # WCA OAuth 应用的 Client ID
    appSecret: ""    # WCA OAuth 应用的 Client Secret
    redirectBase: "http://localhost:8000"   # 回调根地址，生产环境用 https://cubing.pro
    frontendBase: "http://localhost:3000"   # 登录成功后跳回的前端地址
    auths: ["public", "dob", "email", "openid", "profile"]

gateway:
  pem: "/https/cube-cert.pem"
  privateKey: "/https/cube-privatekey.key"
  httpPort: 80
  httpsPort: 443
  # 生产环境建议填写主域名，重定向 Location 保持一致（可从 Host 推导则省略）
  httpsHost: "cubing.pro"
  # --- 遗留 Umi 单页（index + static 子目录，未匹配路由回退 index）---
  # indexPath: "/build/index.html"
  # staticPath: "/build/static"
  # --- Next.js v4 多页静态导出（npm run build:static 产物目录）---
  staticRoot: "/build"   # 或 indexPath: "/build/index.html" 且不要 staticPath，并 spa: false
  spa: false             # Next 多页必须为 false；Umi 单页勿设 staticRoot 并保留 staticPath

api:
  host: "localhost"
  port: 20000

robot:
  QQBot:
    - group: true
      enable: true
      appID: 123
      token: "xxx"
      groupList:
        - "xxxx"
  WeChatBot:
    - enable: false